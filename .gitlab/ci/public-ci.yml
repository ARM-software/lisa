.package-caches:
  cache:
    - key: "pip-${PACKAGE_CACHE_KEY}-${PYTHON_VERSION}-${CI_COMMIT_REF_SLUG}"
      fallback_keys:
        - "pip-${PACKAGE_CACHE_KEY}-${PYTHON_VERSION}-${CI_DEFAULT_BRANCH_SLUG}"
      paths:
        - "$PIP_CACHE_DIR"
      policy: "$CACHE_POLICY"

    - key: "apt-${PACKAGE_CACHE_KEY}-${PYTHON_VERSION}-${CI_COMMIT_REF_SLUG}"
      fallback_keys:
        - "apt-${PACKAGE_CACHE_KEY}-${PYTHON_VERSION}-${CI_DEFAULT_BRANCH_SLUG}"
      paths:
        - "$APT_CACHE_DIR/archives"
        - "$APT_CACHE_DIR/lists"
      policy: "$CACHE_POLICY"


.test-parallel:
  parallel:
    matrix:
      # Skip Python 3.12 as Ubuntu 22.04 does not ship a version containing the
      # fix for: https://github.com/python/cpython/issues/122695
      - PYTHON_VERSION: ["10", "11", "13", "14"]


.refresh-caches:
  resource_group: write-cache
  variables:
    # We rebuild the cache from scratch and push it. We don't want to pull it
    # as doing so will keep the previous cache content and therefore only ever
    # increase its size.
    CACHE_POLICY: "push"

  rules:
      - if: $ENABLE_REFRESH_CACHES != "True"
        when: never

  script:
    - sudo ./install_base.sh --install-all
    - source ./init_env


default:
  tags:
    - ubuntu_22_04_amd64
  # Cancel a job if a new pipeline is triggered on the same branch
  interruptible: true

  before_script:
    - export TZ=UTC
    - export DEBIAN_FRONTEND=noninteractive
    - export PIP_CACHE_DIR=$(realpath -m .cache/pip)
    - export APT_CACHE_DIR=$(realpath -m .cache/apt)
    - export LISA_PYTHON=python3.${PYTHON_VERSION}
    - mkdir -p "$APT_CACHE_DIR/archives/partial"
    - mkdir -p "$APT_CACHE_DIR/lists/partial"
    # Docker containers may be setup with a hook that deletes cached packages
    # to keep the images small. We obviously don't want that as we are trying
    # to populate a reusable cache.
    - sudo rm -f /etc/apt/apt.conf.d/docker-clean || true
    - |
      cat >/tmp/99gitlab-cache <<EOF
      Dir::Cache::archives "$APT_CACHE_DIR/archives";
      Dir::State::lists "$APT_CACHE_DIR/lists";
      Acquire::Retries "3";
      EOF
    - sudo mv /tmp/99gitlab-cache /etc/apt/apt.conf.d/99gitlab-cache
    - sudo apt-get update -y
    - sudo apt-get upgrade -y
    - sudo apt-get install software-properties-common -y
    - sudo add-apt-repository ppa:deadsnakes/ppa -y
    - sudo apt-get update -y
    - sudo apt-get -y install python3-pip python3.${PYTHON_VERSION}-full
    - mkdir -p "$PIP_CACHE_DIR"

  cache:
    - !reference [.package-caches, cache]


# Required for Manual runs through UI
variables:
  PYTHON_VERSION:
    value: "11"
    description: Default version of Python to use for non-test jobs.

  CACHE_POLICY:
    value: "pull"
    options:
      - "pull"
      - "push"
      - "pull-push"
    description: Default gitlab cache policy.

  PACKAGE_CACHE_KEY:
    value: "default"
    description: Key used to separate package caches for jobs that don't use the typical setup.

  ENABLE_TEST:
    value: "True"
    options:
      - "True"
      - "False"
    description: True to enable the test job.

  ENABLE_AUTOBRANCH:
    value: "True"
    options:
      - "True"
      - "False"
    description: True to enable autobranch job.

  ENABLE_PAGES:
    value: "True"
    options:
      - "True"
      - "False"
    description: True to enable gitlab pages build and deploy job. 

  ENABLE_REFRESH_CACHES:
    value: "True"
    options:
      - "True"
      - "False"
    description: True to enable the cache refresh job.


Refresh-Caches:
  extends: .refresh-caches


Refresh-Caches-Matrix:
  extends: .refresh-caches
  parallel: !reference [.test-parallel, parallel]

  rules:
      - if: $ENABLE_REFRESH_CACHES != "True"
        when: never

      - if: $CI_PIPELINE_SOURCE == "web"
      - if: $CI_PIPELINE_SOURCE == "schedule"


Test:
  rules:
      - if: $ENABLE_TEST != "True"
        when: never

      - if: $CI_PIPELINE_SOURCE == "web"
      - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

  parallel: !reference [.test-parallel, parallel]

  needs:
    - job: Refresh-Caches-Matrix
      optional: true

  script:
    - sudo chmod o+rx /sys/kernel/debug
    - sudo ./install_base.sh --install-all
    - bash ./tools/tests.sh |& ts '[%H:%M:%.S]'


Autobranch:
  resource_group: autobranch
  interruptible: false

  needs: 
    - job: Test 
      # If the job was not present (e.g. was manually disabled), we still run.
      # But if it was present and failed, we fail.
      optional: true 

    - job: Refresh-Caches
      optional: true

  environment:
    # This grants the GITLAB_REPO_TOKEN variable allowing to push to the repo
    name: repo_write_access

  variables:
    # Do not clone or fetch anything, as we will do it manually so that the job
    # runs with the code from the default branch (main) rather than the merge
    # request branch for safety reasons.
    GIT_STRATEGY: none

  rules:
      - if: $ENABLE_AUTOBRANCH != "True"
        when: never

      - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH 
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS =~ /(^|,)autobranch($|,)/ 

  script: 
    - |
      # Avoid using /tmp since it's probably in tmpfs and would consume RAM
      export TMPDIR=$(readlink -f .)/tmp
      mkdir -p "$TMPDIR"

      origin_repo=$(mktemp -d)
      git clone -b "$CI_DEFAULT_BRANCH" "$CI_REPOSITORY_URL" "$origin_repo"

      # This is critical for safety: We want to be executing the code from the
      # main branch to avoid any manipulation from the MR branch
      cd "$origin_repo" || exit 1

    - |
      git remote set-url origin "https://gitlab-ci:${GITLAB_REPO_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git remote -v
      git branch --list --remotes

      git config --global user.name 'project_10402_bot_63a504c3fe43f0e42f1c4ebe6263c37b'
      git config --global user.email 'project_10402_bot_63a504c3fe43f0e42f1c4ebe6263c37b@noreply.gitlab.arm.com'

    - |
      function lisa_python() {
        "$LISA_PYTHON" "$@"
      }
      set -e
      export LC_ALL=C
      venv=$(mktemp -d)
      packages=$(mktemp)
      lisa_python -m venv "$venv" && source "$venv/bin/activate"

      # Ensure we have up to date versions of every pre-installed packages
      lisa_python -m pip freeze --exclude-editable --all | cut -f1 -d '=' > "$packages"
      lisa_python -m pip install --upgrade -r "$packages"

      lisa_python -m pip install --upgrade pip-audit ./tools/lisa-combine-gitlab-mr
      pip-audit || exit 1

      function update_branch() {
          local label=$1
          local branch=$2
          local force_branch=$3

          local worktree
          worktree=$(mktemp -d --suffix "-${branch}-repo")

          local patch
          patch=$(mktemp --suffix "-$branch.patch")

          lisa-combine-gitlab-mr --server "$CI_SERVER_HOST" --repo "$CI_PROJECT_PATH" --project-id "$CI_PROJECT_ID" --api-url "$CI_API_V4_URL" --api-token "$GITLAB_REPO_TOKEN" --mr-label "$label" --branch "$force_branch" &&

          git fetch origin "$branch" &&

          # Work in a separate worktree so that there is no risk of folders
          # added to PATH by init_env being manipulated
          git worktree add "$worktree" --checkout "$branch" &&

          git -C "$worktree" diff --binary "HEAD..$force_branch" > "$patch" &&

          if [[ -s "$patch" ]]; then
              # Apply the patch to the index as well, so that any file created
              # is automatically added to the commit we are about to create.
              git -C "$worktree" apply --index "$patch" || return 1
              git -C "$worktree" commit --all -m "Autocommit to $branch branch on $(date) tracking $force_branch" || return 1

              local ret=0
              git push --force origin "$force_branch" || ret=1
              git push origin "$branch" || ret=1
              return $ret
          else
              echo "Empty patch, $branch and $force_branch branches are up to date."
          fi
      }

      ret=0
      function keepgoing {
          "$@" || ret=1
      }

      keepgoing update_branch for-master-autobranch master master-force
      keepgoing update_branch for-preview-autobranch preview preview-force

      exit $ret


Pages:
  resource_group: pages
  interruptible: false

  stage: deploy
  pages: true

  needs:
    - job: Refresh-Caches
      optional: true

  artifacts:
    paths:
        - public

  rules:
      - if: $ENABLE_PAGES != "True"
        when: never

      - if: ($CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "web") && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
        needs: 
          - job: Autobranch
            optional: true
      - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(preview|master|release)$/

  script:
    - sudo apt-get -y install symlinks rdfind
    - |
      function lisa_python() {
          "$LISA_PYTHON" "$@"
      }

      function audit() {
          lisa_python -m pip install --upgrade pip-audit
          # Vulnerability GHSA-xqrq-4mgf-ff32
          # (https://github.com/advisories/GHSA-xqrq-4mgf-ff32) is not
          # concerning as we do not manipulate files from unknown origin that
          # are not also the origin of code (e.g. PyPI packages).
          #
          # Vulnerability CVE-2025-53000: Only affects windows, and we run on
          # Linux.
          pip-audit \
            --ignore-vuln GHSA-xqrq-4mgf-ff32 \
            --ignore-vuln CVE-2025-53000 \
            || exit 1
      }

      function upgrade_packages() {
          packages=$(mktemp)
          # Ensure we have up to date versions of every pre-installed packages
          lisa_python -m pip freeze --local --exclude-editable --all | cut -f1 -d '=' > "$packages"
          lisa_python -m pip install --upgrade -r "$packages"
      }

      set -ex
      # Avoid using /tmp since it's probably in tmpfs and would consume RAM
      export TMPDIR=$(readlink -f .)/tmp
      mkdir -p "$TMPDIR"

      df -h .

    - |
      out="$(readlink -f .)/public"

      function build_branch() {
          local ref=$1
          local publish_as=$2
          local worktree
          worktree=$(mktemp -d --suffix "-worktree") || return 1
          git fetch origin "$ref" || return 1
          git worktree add "$worktree" --checkout "$ref" || return 1
          (
            cd "$worktree" || return 1
            sudo ./install_base.sh --install-doc-extras || return 1

            set +e
            source ./init_env || return 1
            set -e

            audit || return 1

            export LISA_DOC_VERSION="$publish_as"
            export LC_ALL=C
            local doctree
            doctree=$(mktemp -d --suffix "-doctree") || return 1
            cd ./doc && sphinx-build -b html -n --no-color -W --keep-going -T -j auto -d "$doctree" . "$out/$publish_as"
          )
      }

      function fail() {
          if ! "$@"; then
              # If one of the build phases failed, make sure we do not
              # accidentally deploy a partial artifact (likely mostly empty)
              # and exit with error
              rm -r "$out" &>/dev/null
              exit 1
          fi
      }

      export LISA_DOC_BASE_URL="https://tooling.sites.arm.com/lisa"
      # Provide the list of versions for the version switcher
      export LISA_DOC_ALL_VERSIONS='["main", "preview", "master"]'
      fail build_branch main main

      # Disable llms.txt and llms-full.txt generation for most branches as it
      # doubles the doc build time and would be of limited use.
      LISA_DOC_BUILD_LLMS_TXT=0 fail build_branch preview preview
      LISA_DOC_BUILD_LLMS_TXT=0 fail build_branch master master

      # TODO: For now the release branch doc won't build as it lacks some necessary fixes
      # build_branch release release
      # build_branch v4.0.0 v4

      # Expose "main" as the "latest" branch
      (cd "$out" && ln -s ./main ./latest)

      # Make the doc a lot more compact by trimming useless files
      find "$out" '-(' -name '*.ipynb' -or -name '*.ipynb.txt' '-)' -delete

      # Replace duplicates with symlinks to compact the archive
      rdfind -makeresultsfile false -makesymlinks true "$out"
      # Rewrite absolute symlinks into relative ones
      symlinks -cr "$out"

      # Redirect bare address such as https://tooling.sites.arm.com/lisa to a
      # given version
      default=latest
      cat > "$out/_redirects" <<- EOF
      /lisa/ /lisa/$default/ 301
      EOF

    # Debug excessive sizes
    - du -hc "$out" | sort -h

